<!DOCTYPE html>
<html>
<head>
    <title>Users - SmartPOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/auth.js"></script>
    <style>
        .users-table-wrap {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
        }

        .users-chip {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.02em;
            border: 1px solid #d4dce6;
            color: #334155;
            background: #f8fafc;
        }

        .users-chip.role-admin,
        .users-chip.role-manager,
        .users-chip.role-cashier {
            border-color: #d4dce6;
            color: #334155;
            background: #f8fafc;
        }

        .users-chip.status-active {
            border-color: #c8d7eb;
            color: #075985;
            background: #f0f7ff;
        }

        .users-chip.status-inactive {
            border-color: #d4dce6;
            color: #475569;
            background: #f8fafc;
        }

        .users-action-btn {
            border-radius: 8px;
            font-size: 12px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #4f3d63;
            padding: 4px 10px;
        }

        .users-action-btn:hover {
            border-color: #94a3b8;
            background: #f8fafc;
        }

        .users-action-btn.danger {
            border-color: #fecaca;
            color: #b91c1c;
            background: #fff5f5;
        }

        .users-action-btn.danger:hover {
            border-color: #fca5a5;
            background: #fee2e2;
        }

        .users-add-btn {
            border-radius: 10px;
            border: 1px solid #6a5080;
            background: #6a5080;
            color: #ffffff;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
        }

        .users-add-btn:hover {
            background: #5b456f;
            border-color: #5b456f;
            color: #ffffff;
        }
    </style>
</head>
<body id="body">
<div class="container-fluid">
    <div class="row">
        <!-- SIDEBAR -->
        <div id="sidebar" class="col-md-2 text-white p-3">
            <h4>SmartPOS</h4>
            <hr>
            <nav id="sidebar-nav" class="nav flex-column">
                </nav>
        </div>

        <!-- MAIN -->
        <div class="col-md-10 page-wrap">
            <div class="page-header">
                <h2 class="page-title">User Management</h2>
                <button class="btn users-add-btn" onclick="openAddUserModal()">+ Add User</button>
            </div>

            <div class="users-table-wrap">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-header">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Full Name</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- ADD/EDIT USER MODAL -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background-color:#1f0e26; color:white;">
                <h5 class="modal-title" id="userModalTitle">Add User</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="userEditIndex" value="-1">
                <div class="mb-3">
                    <label>Username</label>
                    <input class="form-control" id="uUsername" placeholder="e.g. jdoe">
                </div>
                <div class="mb-3">
                    <label>Full Name</label>
                    <input class="form-control" id="uFullName" placeholder="e.g. John Doe">
                </div>
                <div class="mb-3" id="passwordRow">
                    <label>Password</label>
                    <input class="form-control" id="uPassword" type="password" placeholder="Enter password">
                    <small id="passwordHint" class="text-muted" style="display:none;">Leave blank to keep current password</small>
                </div>
                <div class="mb-3">
                    <label>Role</label>
                    <select class="form-control" id="uRole">
                        <option>Admin</option>
                        <option>Manager</option>
                        <option>Cashier</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Status</label>
                    <select class="form-control" id="uStatus">
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn users-add-btn" onclick="saveUser()">Save User</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/users.js"></script>
    <script>guardPage(); buildSidebar();</script>
</body>
</html>
