<!DOCTYPE html>
<html>
<head>
    <title>Products - SmartPOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/auth.js"></script>
    <style>
        .products-main { background: #f4f1ff; min-height: 100vh; padding: 28px 32px; }

        .page-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .page-topbar h2 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.6rem;
            color: #1f0e26;
            margin: 0;
        }
        .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        .search-input {
            border: 1px solid #d0c4e8;
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 13px;
            font-family: 'Times New Roman', Times, serif;
            background: white;
            width: 240px;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-input:focus { border-color: #8d6c9f; }

        .btn-add {
            background: #1f0e26;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 13px;
            font-family: 'Times New Roman', Times, serif;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-add:hover { background: #3a1a4a; }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 22px;
        }
        .stat-box {
            background: white;
            border-radius: 10px;
            padding: 14px 18px;
            border: 1px solid #e8e0f2;
        }
        .stat-box .s-label { font-size: 11px; color: #9a8aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
        .stat-box .s-value { font-size: 1.6rem; font-weight: 700; font-family: 'Times New Roman', Times, serif; line-height: 1; }

        /* Pills */
        .pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .pill {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-family: 'Times New Roman', Times, serif;
            border: 1px solid #d0c4e8;
            background: white;
            color: #6a5080;
            cursor: pointer;
            transition: all 0.12s;
        }
        .pill:hover { border-color: #8d6c9f; color: #4a2860; }
        .pill.active { background: #1f0e26; color: white; border-color: #1f0e26; }

        /* Product grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
            align-items: start;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            border: 0.5px solid #d8d0e8;
            overflow: hidden;
            transition: box-shadow 0.15s, transform 0.15s;
            width: 100%;
            aspect-ratio: 1 / 1;
            display: flex;
        }
        .product-card:hover {
            box-shadow: 0 4px 16px rgba(130,91,151,0.12);
            transform: translateY(-2px);
        }
        .product-card-body {
            padding: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
            width: 100%;
        }
        .product-card-icon {
            margin-top: 10px;
            margin-bottom: 6px;
        }
        .product-card-name {
            font-size: 14px;
            font-weight: 600;
            font-family: 'Times New Roman', Times, serif;
            color: #1f0e26;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }
        .product-card-cat { font-size: 11px; color: #9a8aaa; margin-bottom: 2px; text-align: center; }
        .product-card-cat.stock-row { margin-bottom: 0; }
        .product-card-footer {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: auto;
            padding-top: 6px;
            border-top: 1px solid #f0e8f8;
            width: 100%;
        }
        .product-card-price {
            font-size: 15px;
            font-weight: 700;
            color: #623c74;
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
        }
        .card-actions { display: flex; gap: 6px; justify-content: center; }
        .btn-icon {
            width: 28px; height: 28px;
            border-radius: 6px;
            border: 1px solid #e0d4f0;
            background: white;
            cursor: pointer;
            font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.12s;
        }
        .btn-icon:hover { background: #f4f0fa; }

        /* Stock badges */
        .stock-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            letter-spacing: 0.03em;
        }
        .badge-ok  { background: #e6f4ee; color: #1a7a47; }
        .badge-low { background: #fff8e1; color: #856404; }
        .badge-out { background: #fde8e8; color: #842029; }

        /* Modal */
        .modal-header {
            background: #1f0e26;
            color: white;
            border-radius: 12px 12px 0 0;
        }
        .modal-content { border-radius: 12px; border: none; }
        .modal-footer { border-top: 1px solid #f0e8f7; }
        .form-label { font-size: 13px; color: #555; font-family: 'Times New Roman', Times, serif; }
        .form-control, .form-select {
            font-size: 13px;
            border: 1px solid #d8cce8;
            border-radius: 8px;
            font-family: 'Times New Roman', Times, serif;
        }
        .form-control:focus, .form-select:focus {
            border-color: #8d6c9f;
            box-shadow: 0 0 0 3px rgba(141,108,159,0.12);
        }
    </style>
</head>
<body id="body">
<div class="container-fluid">
    <div class="row">
        <div id="sidebar" class="col-md-2 text-white p-3">
            <h4>SmartPOS</h4><hr>
            <nav id="sidebar-nav" class="nav flex-column"></nav>
        </div>

        <div class="col-md-10 products-main">

            <div class="page-topbar">
                <h2>Products</h2>
                <div class="topbar-right">
                    <input class="search-input" id="searchInput" placeholder="Search products…" oninput="renderProducts()">
                    <button class="btn-add" onclick="openAddModal()">+ Add Product</button>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-box">
                    <div class="s-label">Total</div>
                    <div class="s-value" style="color:#1f0e26;" id="statTotal">0</div>
                </div>
                <div class="stat-box">
                    <div class="s-label">In Stock</div>
                    <div class="s-value" style="color:#1a7a47;" id="statInStock">0</div>
                </div>
                <div class="stat-box">
                    <div class="s-label">Low Stock</div>
                    <div class="s-value" style="color:#856404;" id="statLow">0</div>
                </div>
                <div class="stat-box">
                    <div class="s-label">Out of Stock</div>
                    <div class="s-value" style="color:#842029;" id="statOut">0</div>
                </div>
            </div>

            <div class="pill-row" id="categoryPills"></div>

            <div class="products-grid" id="productsGrid"></div>

        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-md">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add Product</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" id="editIndex" value="-1">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Product Name <span class="text-danger">*</span></label>
                        <input class="form-control" id="pName" placeholder="e.g. Whole Wheat Bread">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Supplier</label>
                        <input class="form-control" id="pSupplier" placeholder="e.g. Sunrise Distributors">
                    </div>
                    <div class="col-6">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="pCategory">
                            <option>Food</option>
                            <option>Beverages</option>
                            <option>Household</option>
                            <option>Electronics</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Price (GH₵) <span class="text-danger">*</span></label>
                        <input class="form-control" id="pPrice" type="number" step="0.01" min="0" placeholder="0.00">
                    </div>
                    <div class="col-6">
                        <label class="form-label">Stock Quantity <span class="text-danger">*</span></label>
                        <input class="form-control" id="pStock" type="number" min="0" placeholder="0">
                    </div>
                    <div class="col-6">
                        <label class="form-label">Barcode</label>
                        <input class="form-control" id="pBarcode" placeholder="e.g. 1000000001">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-light" data-bs-dismiss="modal" style="border-radius:8px;font-size:13px;">Cancel</button>
                <button class="btn-add" onclick="saveProduct()">Save Product</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/icons.js"></script>
<script src="js/products.js"></script>
<script>guardPage(); buildSidebar();</script>
</body>
</html>
