<!DOCTYPE html>
<html>
<head>
    <title>Users - SmartPOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/auth.js"></script>
</head>
<body id="body">
<div class="container-fluid">
    <div class="row">
        <!-- SIDEBAR -->
        <div id="sidebar" class="col-md-2 text-white p-3">
            <h4>SmartPOS</h4>
            <hr>
            <nav id="sidebar-nav" class="nav flex-column">
                </nav>
        </div>

        <!-- MAIN -->
        <div class="col-md-10 page-wrap">
            <div class="page-header">
                <h2 class="page-title">User Management</h2>
                <button class="btn" id="checkout-button" onclick="openAddUserModal()">+ Add User</button>
            </div>

            <table class="table table-striped table-hover">
                <thead class="table-header">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- ADD/EDIT USER MODAL -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background-color:#1f0e26; color:white;">
                <h5 class="modal-title" id="userModalTitle">Add User</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="userEditIndex" value="-1">
                <div class="mb-3">
                    <label>Username</label>
                    <input class="form-control" id="uUsername" placeholder="e.g. jdoe">
                </div>
                <div class="mb-3">
                    <label>Full Name</label>
                    <input class="form-control" id="uFullName" placeholder="e.g. John Doe">
                </div>
                <div class="mb-3" id="passwordRow">
                    <label>Password</label>
                    <input class="form-control" id="uPassword" type="password" placeholder="Enter password">
                    <small id="passwordHint" class="text-muted" style="display:none;">Leave blank to keep current password</small>
                </div>
                <div class="mb-3">
                    <label>Role</label>
                    <select class="form-control" id="uRole">
                        <option>Admin</option>
                        <option>Manager</option>
                        <option>Cashier</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Status</label>
                    <select class="form-control" id="uStatus">
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn" id="checkout-button" onclick="saveUser()">Save User</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/users.js"></script>
    <script>guardPage(); buildSidebar();</script>
</body>
</html>
