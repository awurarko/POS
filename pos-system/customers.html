<!DOCTYPE html>
<html>
<head>
    <title>Customers - SmartPOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/auth.js"></script>
    <style>
        .customers-main { background:#f4f1ff; min-height:100vh; padding:28px 32px; }
        .page-topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
        .page-topbar h2 { font-family:'Times New Roman',Times,serif; font-size:1.6rem; color:#4f3d63; margin:0; }
        .topbar-actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
        .search-input { border:1px solid #d0c4e8; border-radius:8px; padding:7px 14px; font-size:13px; font-family:'Times New Roman',Times,serif; background:white; width:240px; outline:none; transition:border-color 0.15s; }
        .search-input:focus { border-color:#8d6c9f; }
        .btn-add { background:#6a5080; color:white; border:none; border-radius:8px; padding:8px 18px; font-size:13px; font-family:'Times New Roman',Times,serif; cursor:pointer; transition:background 0.15s; }
        .btn-add:hover { background:#5b456f; }
        .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; align-items:stretch; }
        .stat-box {
            border-radius:16px;
            border:1px solid #d8e2f1;
            background:linear-gradient(125deg,#f6fbff 0%,#ffffff 52%,#eef8ff 100%);
            box-shadow:0 18px 40px -36px rgba(2,132,199,0.55);
            padding:12px 14px;
            min-height:110px;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
        }
        .stat-box .s-label { font-size:11px; color:#9a8aaa; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
        .stat-box .s-value { font-size:clamp(1.45rem,3.4vw,1.95rem); font-weight:700; font-family:'Times New Roman',Times,serif; line-height:1.1; color:#4f3d63; }
        .stat-box .s-value-muted { color:#6a5080; }
        .stat-box .s-value-accent { color:#6a5080; }
        .table-wrap { background:white; border-radius:12px; border:1px solid #e8e0f2; overflow:hidden; }
        .table { margin:0; font-family:'Times New Roman',Times,serif; font-size:13px; }
        .table thead th { background:#6a5080; color:white; font-weight:500; border:none; padding:12px 14px; font-size:12px; letter-spacing:0.04em; }
        .table tbody td { padding:11px 14px; border-bottom:1px solid #f4f0fa; vertical-align:middle; }
        .table tbody tr:last-child td { border-bottom:none; }
        .table tbody tr:hover { background:#faf8ff; }
        .c-id { font-size:12px; color:#8d8599; }
        .c-name { font-weight:600; color:#3f3151; }
        .c-address { color:#726a7c; font-size:12px; }
        .c-points { font-weight:700; color:#6a5080; }
        .c-tier { font-size:10px; color:#8f7aa8; margin-left:4px; text-transform:uppercase; letter-spacing:0.04em; }
        .c-empty { text-align:center; color:#9c93a8; padding:28px; }
        .c-action { font-size:11px; border-radius:8px; padding:3px 9px; }
        .c-action-edit { border:1px solid #d7cde8; color:#5a486f; background:#f8f4ff; }
        .c-action-edit:hover { background:#efe8fb; border-color:#c9bde1; color:#4d3d61; }
        .c-action-delete { border:1px solid #efcfdf; color:#9f285d; background:#fff5fa; }
        .c-action-delete:hover { background:#ffeaf3; border-color:#e9b9d1; color:#8a1f50; }
        .pagination-wrap { margin-top:12px; display:flex; gap:8px; align-items:center; font-size:12px; color:#6a5080; }
        .page-btn { border:1px solid #ddd2ee; background:#fff; color:#5a486f; border-radius:7px; padding:3px 10px; font-size:11px; }
        .page-btn:hover:not(:disabled) { background:#f6f0ff; }
        .page-btn:disabled { opacity:.5; cursor:not-allowed; }
        .modal-header { background:#6a5080; color:white; }
        .modal-content { border-radius:12px; border:none; }
        .form-label { font-size:13px; color:#555; font-family:'Times New Roman',Times,serif; }
        .form-control { font-size:13px; border:1px solid #d8cce8; border-radius:8px; font-family:'Times New Roman',Times,serif; }
        .form-control:focus { border-color:#8d6c9f; box-shadow:0 0 0 3px rgba(141,108,159,0.12); }
        .history-head { background:#f4f0fa; }
        .history-head th { padding:10px 16px; font-size:12px; color:#6a5080; }
        .history-total { font-weight:700; color:#6a5080; }
        .modal-divider { border-top:1px solid #f0e8f7; }
        .modal-close-btn { border-radius:8px; }
    </style>
</head>
<body id="body">
<div class="container-fluid">
    <div class="row">
        <div id="sidebar" class="col-md-2 text-white p-3">
            <h4>SmartPOS</h4><hr>
            <nav id="sidebar-nav" class="nav flex-column"></nav>
        </div>

        <div class="col-md-10 customers-main">
            <div class="page-topbar">
                <h2>Customers</h2>
                <div class="topbar-actions">
                    <input class="search-input" id="searchInput" placeholder="Search customers..." oninput="renderCustomers()">
                    <button class="btn-add" onclick="openAddModal()">+ Add Customer</button>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-box">
                    <div class="s-label">Total Customers</div>
                    <div class="s-value" id="statTotal">0</div>
                </div>
                <div class="stat-box">
                    <div class="s-label">Total Loyalty Points</div>
                    <div class="s-value s-value-muted" id="statPoints">0</div>
                </div>
                <div class="stat-box">
                    <div class="s-label">With Purchase History</div>
                    <div class="s-value s-value-accent" id="statActive">0</div>
                </div>
            </div>

            <div class="table-wrap">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Address</th>
                            <th>Loyalty Points</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customersTable"></tbody>
                </table>
            </div>
            <div id="customerPagination" class="pagination-wrap"></div>
        </div>
    </div>
</div>

<!-- PURCHASE HISTORY MODAL -->
<div class="modal fade" id="historyModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Purchase History - <span id="historyName"></span></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <table class="table mb-0">
                    <thead class="history-head">
                        <tr>
                            <th>Transaction</th>
                            <th>Date & Time</th>
                            <th>Items</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable"></tbody>
                </table>
            </div>
            <div class="modal-footer modal-divider">
                <button class="btn btn-light btn-sm modal-close-btn" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- ADD / EDIT CUSTOMER MODAL -->
<div class="modal fade" id="customerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add Customer</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" id="editIndex" value="-1">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input class="form-control" id="cName" placeholder="e.g. Kofi Mensah">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone Number <span class="text-danger">*</span></label>
                        <input class="form-control" id="cPhone" placeholder="e.g. 0244123456">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input class="form-control" id="cEmail" type="email" placeholder="e.g. kofi@email.com">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Address</label>
                        <input class="form-control" id="cAddress" placeholder="e.g. Kumasi, Ashanti">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Loyalty Points</label>
                        <input class="form-control" id="cPoints" type="number" min="0" placeholder="0">
                    </div>
                </div>
            </div>
            <div class="modal-footer modal-divider">
                <button class="btn btn-light btn-sm modal-close-btn" data-bs-dismiss="modal">Cancel</button>
                <button class="btn-add" onclick="saveCustomer()">Save Customer</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/customers.js"></script>
<script>guardPage(); buildSidebar();</script>
</body>
</html>
